steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-east1-docker.pkg.dev/$PROJECT_ID/webhook-repo/unrecognized-message-classification:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-east1-docker.pkg.dev/$PROJECT_ID/webhook-repo/unrecognized-message-classification:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - unrecognized-message-classification
      - --image=us-east1-docker.pkg.dev/$PROJECT_ID/webhook-repo/unrecognized-message-classification:$COMMIT_SHA
      - --region=us-east1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8081
      - --min-instances=0
      - --concurrency=50

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - us-east1-docker.pkg.dev/$PROJECT_ID/webhook-repo/unrecognized-message-classification:$COMMIT_SHA